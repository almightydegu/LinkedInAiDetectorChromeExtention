<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn AI Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 280px;
      background: #fff;
      color: #1e293b;
    }

    .header {
      background: #1d4ed8;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 24px; line-height: 1; }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: #bfdbfe;
      margin-top: 2px;
    }

    .body {
      padding: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12.5px;
      font-weight: 500;
    }

    .status-row.ok  { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .status-row.warn{ background: #fefce8; color: #a16207; border: 1px solid #fde68a; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.green { background: #22c55e; }
    .dot.yellow { background: #eab308; }

    p.desc {
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: #2563eb; }

    .btn-outline {
      background: transparent;
      color: #3b82f6;
      border: 1.5px solid #3b82f6;
      margin-top: 8px;
    }

    .btn-outline:hover { background: #eff6ff; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>LinkedIn AI Detector</h1>
      <p>Powered by Claude Haiku</p>
    </div>
  </div>

  <div class="body">
    <div id="statusRow" class="status-row warn">
      <div class="dot yellow"></div>
      <span id="statusText">Checking API key…</span>
    </div>

    <p class="desc">
      Analyses each LinkedIn post for AI writing patterns and shows a 5-icon score
      (🤖 robots for AI, 👤 humans for human writing) next to the author's name.
    </p>

    <a href="#" class="btn" id="settingsBtn">Open Settings</a>
    <a href="https://www.linkedin.com/feed/" target="_blank" class="btn btn-outline" id="linkedinBtn">Go to LinkedIn Feed</a>
  </div>

  <div class="footer">Only analyses writing style, not content</div>

  <script src="popup.js"></script>
</body>
</html>
